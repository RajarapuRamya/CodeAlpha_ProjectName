<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h2>TechStore</h2>
    </header>

    <main>
        <div class="login-box">

            <h1>Login</h1>

            <form id="loginForm">

                <input
                    type="email"
                    id="email"
                    placeholder="Email"
                    required>

                <input
                    type="password"
                    id="password"
                    placeholder="Password"
                    required>

                <a href="#" class="forgot-link">
                    Forgot Password?
                </a>

                <button type="submit">
                    Login
                </button>

            </form>

        </div>
    </main>

    <script src="js/auth.js"></script>

</body>
</html>
